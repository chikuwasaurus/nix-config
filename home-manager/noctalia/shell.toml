[shell]
avatar_path = "~/.config/noctalia/avatar.png"
launch_apps_as_systemd_services = true  # launch apps as transient systemd scopes
polkit_agent = true  # register Noctalia's native polkit authentication agent
screen_time_enabled = true  # track per-app usage time for the Control Center screen-time view
clipboard_auto_paste = "off"  # off | auto | ctrl_v | ctrl_shift_v | shift_insert
clipboard_history_max_entries = 10000  # unpinned history cap (10–10000); pinned entries are exempt

[shell.animation]
enabled = false

[shell.greeter_sync]
auto_sync = true  # auto sync Greeter and Greeter Sync

[keybinds]
cancel = ["escape", "ctrl+c"]
left = ["left", "ctrl+h", "ctrl+b"]
right = ["right", "ctrl+l", "ctrl+f"]
up = ["up", "ctrl+k", "ctrl+p"]
down = ["down", "ctrl+j", "ctrl+n"]
