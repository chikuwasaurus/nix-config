gui:
  nerdFontsVersion: "3"
  showNumstatInFilesView: true
  # [Catppuccin for Lazygit](https://github.com/catppuccin/lazygit/blob/main/themes/mocha/mauve.yml)
  theme:
    activeBorderColor:
      - '#cba6f7'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    searchingActiveBorderColor:
      - '#f9e2af'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    inactiveViewSelectedLineBgColor:
      - '#6c7086'
    cherryPickedCommitFgColor:
      - '#cba6f7'
    cherryPickedCommitBgColor:
      - '#45475a'
    markedBaseCommitFgColor:
      - '#89b4fa'
    markedBaseCommitBgColor:
      - '#f9e2af'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
  authorColors:
    '*': '#b4befe'
git:
  pagers:
    - colorArg: always
      pager: delta --paging=never

# In Helix-launched lazygit, hand the selected file back to Helix and close lazygit.
# In normal lazygit, open it directly with hx.
# see: ~/Developer/nix-config/home-manager/helix/config.toml
os:
  edit: 'sh -c ''if [ -n "$HELIX_LAZYGIT_FILE" ]; then printf "%s\n" "$1" > "$HELIX_LAZYGIT_FILE" && kill -TERM "$PPID"; else hx "$1"; fi'' -- "{{filename}}"'
  editAtLine: 'sh -c ''if [ -n "$HELIX_LAZYGIT_FILE" ]; then printf "%s:%s\n" "$1" "$2" > "$HELIX_LAZYGIT_FILE" && kill -TERM "$PPID"; else hx "$1:$2"; fi'' -- "{{filename}}" "{{line}}"'
  editAtLineAndWait: 'sh -c ''if [ -n "$HELIX_LAZYGIT_FILE" ]; then printf "%s:%s\n" "$1" "$2" > "$HELIX_LAZYGIT_FILE" && kill -TERM "$PPID"; else hx "$1:$2"; fi'' -- "{{filename}}" "{{line}}"'
