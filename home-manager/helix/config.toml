theme = "catppuccin_mocha"

[editor]
color-modes = true
bufferline = "always"
trim-final-newlines = true
trim-trailing-whitespace = true
line-number = "relative"
cursorline = true

[editor.indent-guides]
render = true

[editor.auto-save]
focus-lost = true

[editor.statusline]
left = [
  "mode",
  "spinner",
  "version-control",
  "file-name",
  "read-only-indicator",
  "file-modification-indicator"
]
right = [
  "diagnostics",
  "selections",
  "register",
  "position",
  "file-encoding",
  "file-indent-style",
  "file-type"
]

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.soft-wrap]
enable = false

[editor.file-picker]
hidden = false

[keys.normal]
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"
A-r = ":reload-all"
# Launch lazygit, yazi, and scooter from Helix
# https://github.com/helix-editor/helix/wiki/Recipes
#
# Run lazygit from Helix and let it hand selected files back through a temp file.
# This avoids spawning a nested editor from lazygit inside :insert-output.
# see: ~/Developer/nix-config/home-manager/lazygit/config.yml
#
# https://github.com/jesseduffield/lazygit/discussions/4399#discussioncomment-13071651
C-g = [
  ":write-all",
  ":sh rm -f /tmp/helix-lazygit-file",
  ":new",
  ":insert-output HELIX_LAZYGIT_FILE=/tmp/helix-lazygit-file lazygit",
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ":buffer-close!",
  ":open %sh{cat /tmp/helix-lazygit-file 2>/dev/null || echo %{buffer_name}}",
  ":redraw",
  ":reload-all"
]
# Pick a file with yazi and hand it back to Helix through --chooser-file.
# This works around the lack of an integrated terminal in Helix.
#
# https://github.com/helix-editor/helix/discussions/12934#discussioncomment-12438498
C-y = [
  ":write-all",
  ":sh rm -f /tmp/helix-yazi-file",
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/helix-yazi-file',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ":open %sh{cat /tmp/helix-yazi-file 2>/dev/null || echo %{buffer_name}}",
  ":redraw",
  ":reload-all"
]
# Launch scooter from Helix for project-wide search and replace.
# Use --no-stdin and redirect scooter's TUI to the real terminal so
# :insert-output does not try to capture the interactive UI into a buffer.
# Reload all buffers afterward to pick up file changes made by scooter.
#
# https://github.com/helix-editor/helix/discussions/3793#discussioncomment-13817834
C-r = [
  ":write-all",
  ":insert-output scooter --no-stdin >/dev/tty",
  ":redraw",
  ":reload-all"
]

[keys.select]
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"
