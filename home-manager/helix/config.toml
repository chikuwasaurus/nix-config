theme = "catppuccin_mocha"

[editor]
color-modes = true
bufferline = "always"

[editor.auto-save]
focus-lost = true

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name", "read-only-indicator", "file-modification-indicator"]
right = ["diagnostics", "selections", "register", "position", "file-encoding", "file-indent-style", "file-type"]

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.soft-wrap]
enable = true

[editor.file-picker]
hidden = false

[keys.normal]
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"
A-s = ":write-all"
A-r = [":write-all", ":reload-all"]

[keys.select]
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"
